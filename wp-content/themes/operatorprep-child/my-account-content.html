<style>
.entry-title,.page-title,.wp-block-post-title{display:none !important}

/* Study Materials Dashboard — inside WooCommerce content area */
.opp-dash{margin-top:24px;padding-top:20px;border-top:1px solid #e4e8ed}
.opp-dash-title{font-size:1.1em;font-weight:700;color:#0b1220;margin-bottom:3px}
.opp-dash-sub{color:#3a4a5c;font-size:.875em;margin-bottom:14px}
.opp-dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:16px}

/* Card — matches topic card style from practice tests */
.opp-dash-card{background:#fff;border:1px solid #e4e8ed;border-left:3px solid #0f5ea8;border-radius:8px;padding:16px;transition:box-shadow .2s}
.opp-dash-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.opp-dash-card.wd{border-left-color:#1a6a3a}
.opp-dash-card.ww{border-left-color:#6a3a1a}
.opp-dash-card-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}

/* Badge — dark rounded square like the practice test icon */
.opp-dash-card-badge{background:#0b1220;border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8em;color:#fff;font-family:'JetBrains Mono',monospace;flex-shrink:0;letter-spacing:-.02em}
.opp-dash-card-badge.wd{background:#1a4a2a}
.opp-dash-card-badge.ww{background:#4a2a1a}
.opp-dash-card-title{font-weight:700;font-size:.95em;color:#0b1220;line-height:1.3}
.opp-dash-card-sub{font-size:.7em;color:#0f5ea8;margin-top:2px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em}

/* Tool links — row with arrow, matches topic card link style */
.opp-dash-tools{display:flex;flex-direction:column;gap:5px}
.opp-dash-tool{display:flex;align-items:center;justify-content:space-between;background:#f4f6f8;border:1px solid #e4e8ed;border-radius:6px;padding:8px 12px;color:#0b1220;text-decoration:none;font-size:.85em;transition:background .15s,border-color .15s,color .15s}
.opp-dash-tool:hover{background:#e8f1fa;border-color:#0f5ea8;color:#0f5ea8;text-decoration:none}
.opp-dash-tool-label{font-weight:600}
.opp-dash-tool-arrow{color:#0f5ea8;font-size:.9em;flex-shrink:0}

/* No subscription state */
.opp-dash-nosub{background:#fff;border:1px solid #e4e8ed;border-radius:8px;padding:24px;text-align:center}
.opp-dash-nosub p{color:#3a4a5c;margin-bottom:12px}
.opp-dash-nosub a{display:inline-block;background:#0f5ea8;border-radius:6px;padding:10px 24px;color:#fff !important;text-decoration:none;font-weight:600;font-size:.95em;transition:background .2s}
.opp-dash-nosub a:hover{background:#0a4a87;color:#fff !important;text-decoration:none}
.opp-dash-hide{display:none}
</style>

function detectSubs(callback){
  if(!window.OP_AJAX){callback([]);return;}
  var fd=new FormData();
  fd.append('action','op_active_subs');
  fd.append('nonce',window.OP_AJAX.nonce);
  fetch(window.OP_AJAX.url,{method:'POST',body:fd,credentials:'same-origin'})
    .then(function(r){return r.text();})
    .then(function(t){
      try{
        var d=JSON.parse(t);
        callback((d && d.success && Array.isArray(d.data))?d.data:[]);
      }catch(e){callback([]);}
    })
    .catch(function(){callback([]);});
}

function renderDash(subs){
  var grid=document.getElementById("opp-dash-grid");
  var nosub=document.getElementById("opp-dash-nosub");
  var sub=document.getElementById("opp-dash-sub");
  if(subs.length===0){
    grid.style.display="none";
    nosub.classList.remove("opp-dash-hide");
    sub.textContent="Start studying for your certification exam today.";
    return;
  }
  sub.textContent=subs.length+" active "+(subs.length===1?"certification":"certifications");
  nosub.classList.add("opp-dash-hide");
  grid.innerHTML="";
  subs.forEach(function(key){
    var c=CERT_MAP[key];
    if(!c) return;
    var card=document.createElement("div");
    card.className="opp-dash-card "+c.type;
    var html='<div class="opp-dash-card-head">';
    html+='<div class="opp-dash-card-badge '+c.type+'">'+c.label+'</div>';
    html+='<div><div class="opp-dash-card-title">'+c.full+'</div>';
    html+='<div class="opp-dash-card-sub">Active</div></div></div>';
    html+='<div class="opp-dash-tools">';
    c.tools.forEach(function(t){
      html+='<a href="'+t.url+'" class="opp-dash-tool"><span class="opp-dash-tool-label">'+t.name+'</span><span class="opp-dash-tool-arrow">&#8594;</span></a>';
    });
    html+='</div>';
    card.innerHTML=html;
    grid.appendChild(card);
  });
}

function init(){
  var dash=document.getElementById("opp-dash");
  /* Hide for guests */
  if(window.OP_AJAX && !window.OP_AJAX.logged_in){
    dash.style.display="none";
    return;
  }
  var loginForm=document.querySelector(".woocommerce-form-login, .login");
  if(loginForm && !document.querySelector(".woocommerce-MyAccount-navigation")){
    dash.style.display="none";
    return;
  }
  /* Move dash into WooCommerce content area so it sits next to the nav sidebar */
  var wcContent=document.querySelector(".woocommerce-MyAccount-content");
  if(wcContent){
    wcContent.appendChild(dash);
  }
  dash.classList.remove("opp-dash-hide");
  detectSubs(function(subs){ renderDash(subs); });
}

if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init);}
else{setTimeout(init,500);}
