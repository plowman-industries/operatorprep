<style>
.entry-title,.page-title,.wp-block-post-title{display:none !important}
.op-cert-hero{padding:40px 24px 32px}
.op-cert-hero-inner h1{font-size:1.8rem;color:#fff;margin-bottom:8px}
.op-cert-hero-inner p{color:rgba(255,255,255,0.8);margin:0}

/* Study Materials Dashboard */
.opp-dash{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;max-width:900px;margin:0 auto 30px;padding:0 20px}
.opp-dash-title{font-size:1.4em;font-weight:700;color:#fff;margin-bottom:6px}
.opp-dash-sub{color:#8899aa;font-size:.95em;margin-bottom:20px}
.opp-dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:24px}
.opp-dash-card{background:#1a2a3a;border:2px solid #2a4a6a;border-radius:14px;padding:20px;transition:all .2s}
.opp-dash-card:hover{border-color:#4a8abf;transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.opp-dash-card-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.opp-dash-card-badge{background:linear-gradient(135deg,#2a5a8a,#1a3a5a);border:2px solid #3a7aba;border-radius:10px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1em;color:#fff}
.opp-dash-card-badge.wt{background:linear-gradient(135deg,#2a5a8a,#1a3a5a);border-color:#3a7aba}
.opp-dash-card-badge.wd{background:linear-gradient(135deg,#2a6a4a,#1a4a2a);border-color:#3a8a5a}
.opp-dash-card-badge.ww{background:linear-gradient(135deg,#6a3a2a,#4a2a1a);border-color:#8a5a3a}
.opp-dash-card-title{font-weight:700;font-size:1.05em;color:#fff}
.opp-dash-card-sub{font-size:.8em;color:#6a9abf;margin-top:2px}
.opp-dash-tools{display:flex;flex-direction:column;gap:8px}
.opp-dash-tool{display:flex;align-items:center;gap:8px;background:#0d1f30;border:1px solid #1a3a5a;border-radius:8px;padding:10px 14px;color:#d0e0f0;text-decoration:none;font-size:.9em;transition:all .2s}
.opp-dash-tool:hover{background:#1a3050;border-color:#3a7aba;color:#fff;text-decoration:none}
.opp-dash-tool .tool-icon{font-size:1.1em;width:22px;text-align:center}
.opp-dash-tool .tool-label{font-weight:500}
.opp-dash-nosub{background:#1a2a3a;border:2px solid #2a4a6a;border-radius:14px;padding:28px;text-align:center}
.opp-dash-nosub p{color:#8899aa;font-size:1em;margin-bottom:14px}
.opp-dash-nosub a{display:inline-block;background:linear-gradient(135deg,#2a5a8a,#1a3a5a);border:2px solid #3a7aba;border-radius:10px;padding:12px 28px;color:#fff;text-decoration:none;font-weight:600;font-size:1em;transition:all .2s}
.opp-dash-nosub a:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(42,90,138,.5);border-color:#5a9ada;text-decoration:none;color:#fff}
.opp-dash-hide{display:none}
</style>

/* ── detectSubs: uses server-side AJAX for accurate, authoritative results ── */
function detectSubs(callback){
  if(!window.OP_AJAX){callback([]);return;}
  var fd=new FormData();
  fd.append('action','op_active_subs');
  fd.append('nonce',window.OP_AJAX.nonce);
  fetch(window.OP_AJAX.url,{method:'POST',body:fd,credentials:'same-origin'})
    .then(function(r){return r.text();})
    .then(function(t){
      try{
        var d=JSON.parse(t);
        callback((d && d.success && Array.isArray(d.data))?d.data:[]);
      }catch(e){callback([]);}
    })
    .catch(function(){callback([]);});
}

function renderDash(subs){
var grid=document.getElementById("opp-dash-grid");
var nosub=document.getElementById("opp-dash-nosub");
var sub=document.getElementById("opp-dash-sub");
if(subs.length===0){
grid.style.display="none";
nosub.classList.remove("opp-dash-hide");
sub.textContent="Start studying for your certification exam today.";
return;
}
sub.textContent=subs.length+" active "+(subs.length===1?"certification":"certifications");
nosub.classList.add("opp-dash-hide");
grid.innerHTML="";
subs.forEach(function(key){
var c=CERT_MAP[key];
if(!c) return;
var card=document.createElement("div");
card.className="opp-dash-card";
var html='<div class="opp-dash-card-head">';
html+='<div class="opp-dash-card-badge '+c.type+'">'+c.label+'</div>';
html+='<div><div class="opp-dash-card-title">'+c.full+'</div>';
html+='<div class="opp-dash-card-sub">Active subscription</div></div></div>';
html+='<div class="opp-dash-tools">';
c.tools.forEach(function(t){
html+='<a href="'+t.url+'" class="opp-dash-tool"><span class="tool-icon">'+t.icon+'</span><span class="tool-label">'+t.name+'</span></a>';
});
html+='</div>';
card.innerHTML=html;
grid.appendChild(card);
});
}

function init(){
var dash=document.getElementById("opp-dash");
/* Hide dashboard immediately if user is not logged in */
if(window.OP_AJAX && !window.OP_AJAX.logged_in){
dash.style.display="none";
return;
}
/* Fallback DOM check for edge cases */
var loginForm=document.querySelector(".woocommerce-form-login, .login");
if(loginForm && !document.querySelector(".woocommerce-MyAccount-navigation")){
dash.style.display="none";
return;
}
detectSubs(function(subs){
renderDash(subs);
});
}

if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init);}
else{setTimeout(init,500);}
})();
