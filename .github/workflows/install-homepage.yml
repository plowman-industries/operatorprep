name: Install Homepage Content

on:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Install homepage v2 content via WP-CLI
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.STAGING_SSH_USER }}/www/staging2.operatorprep.com/public_html
            
            # Write content to temp file using base64
            echo '' | base64 -d > /tmp/homepage_content.html
            
            # Get the home page ID
            HOME_ID=$(wp post list --post_type=page --name=home --field=ID --allow-root 2>/dev/null | head -1)
            
            if [ -z "$HOME_ID" ]; then
              echo "Creating new home page..."
              HOME_ID=$(wp post create --post_type=page --post_title='Home' --post_name='home' --post_status=publish --porcelain --allow-root)
            fi
            
            echo "Updating page ID: $HOME_ID"
            
            # Update the page content
            wp post update $HOME_ID --post_content="$(cat /tmp/homepage_content.html)" --allow-root
            
            # Set as front page
            wp option update show_on_front page --allow-root
            wp option update page_on_front $HOME_ID --allow-root
            wp rewrite flush --allow-root
            
            # Clean up
            rm /tmp/homepage_content.html
            
            echo "Homepage installed. ID: $HOME_ID"
            echo "URL: https://staging2.operatorprep.com/"
