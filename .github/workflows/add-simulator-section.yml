name: Add Simulator Section to Homepage

on:
  workflow_dispatch:

jobs:
  add-section:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SCP scripts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          source: "scripts/add_simulator_section.php,wp-content/themes/operatorprep-child/style.css"
          target: /tmp/opp-sims/

      - name: Deploy CSS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cp /tmp/opp-sims/wp-content/themes/operatorprep-child/style.css \
               /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html/wp-content/themes/operatorprep-child/style.css

      - name: Run homepage update script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval-file /tmp/opp-sims/scripts/add_simulator_section.php --allow-root 2>&1

      - name: Cleanup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: rm -rf /tmp/opp-sims
