name: Check User Subscriptions

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Phoenix subscriptions via WP-CLI
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval "
            \$user = get_user_by('email', 'phoenix.aiclaw@gmail.com');
            if (!\$user) { echo 'USER NOT FOUND'; exit; }
            echo 'User ID: ' . \$user->ID . PHP_EOL;
            if (!function_exists('wcs_get_users_subscriptions')) { echo 'WCS not active'; exit; }
            \$subs = wcs_get_users_subscriptions(\$user->ID);
            echo 'Total subscriptions: ' . count(\$subs) . PHP_EOL;
            foreach (\$subs as \$sub) {
              echo 'Sub #' . \$sub->get_id() . ' [' . \$sub->get_status() . ']: ';
              foreach (\$sub->get_items() as \$item) {
                echo \$item->get_name() . ' (product_id=' . \$item->get_product_id() . ') ';
              }
              echo PHP_EOL;
            }
            " --allow-root 2>&1
