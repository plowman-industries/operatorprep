name: Check Flashcard Pages

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Find shortcode registration and dump T1+T2 output
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            echo "=== Finding shortcode registration ==="
            grep -r "opp_t1_flashcards\|add_shortcode.*opp_" wp-content/plugins/ --include="*.php" -l 2>/dev/null | head -5
            grep -r "opp_t1_flashcards\|add_shortcode.*opp_" wp-content/mu-plugins/ --include="*.php" -l 2>/dev/null | head -5
            echo "=== Shortcode callback source ==="
            grep -r "opp_t1_flashcards" wp-content/ --include="*.php" -n 2>/dev/null | head -20
