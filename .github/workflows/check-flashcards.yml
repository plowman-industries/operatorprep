name: Check Flashcard Pages

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Find flashcard shortcode source
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            echo "=== All plugins ==="
            ls wp-content/plugins/ 2>/dev/null || echo "none"
            echo "=== mu-plugins ==="
            ls wp-content/mu-plugins/ 2>/dev/null || echo "none"
            echo "=== Search for opp shortcode ==="
            grep -r "opp_" wp-content/ --include="*.php" -l 2>/dev/null | head -10 || echo "not found in php"
            echo "=== WP active plugins ==="
            wp option get active_plugins --allow-root 2>/dev/null | head -30 || true
