name: Check Flashcard Pages

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Read key flashcard snippets
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval "
            global \$wpdb;
            \$ids=[11,25,26,42,50];
            foreach(\$ids as \$id){
              \$r=\$wpdb->get_row('SELECT id,name,code FROM ugk_snippets WHERE id='.\$id);
              if(!\$r){ echo 'NOT FOUND: '.\$id.PHP_EOL; continue; }
              echo '=====SNIPPET '.\$r->id.': '.\$r->name.'====='.PHP_EOL;
              echo \$r->code.PHP_EOL;
              echo '=====END====='.PHP_EOL;
            }
            " --allow-root 2>&1
