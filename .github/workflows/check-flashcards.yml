name: Check Flashcard Pages

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Read code snippets for flashcard shortcodes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval "
            global \$wpdb;
            \$snippets = \$wpdb->get_results('SELECT id, name, LEFT(code,500) as code_preview FROM wp_snippets WHERE name LIKE \"%flash%\" OR code LIKE \"%opp_%flashcard%\" LIMIT 20');
            foreach(\$snippets as \$s){
              echo 'ID:'.\$s->id.' NAME:'.\$s->name.PHP_EOL;
              echo \$s->code_preview.PHP_EOL;
              echo '---'.PHP_EOL;
            }
            if(empty(\$snippets)){ echo 'No flashcard snippets found. Listing all snippets:'.PHP_EOL;
              \$all=\$wpdb->get_results('SELECT id,name FROM wp_snippets');
              foreach(\$all as \$s){ echo 'ID:'.\$s->id.' '.\$s->name.PHP_EOL; }
            }
            " --allow-root 2>&1
