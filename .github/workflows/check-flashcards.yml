name: Check Flashcard Pages

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Find flashcard shortcode via DB and wp_list_filter
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval "
            global \$wpdb;
            echo 'DB prefix: '.\$wpdb->prefix.PHP_EOL;
            \$tables=\$wpdb->get_col('SHOW TABLES LIKE \"%snippet%\"');
            echo 'Snippet tables: '.implode(', ',\$tables).PHP_EOL;
            \$all=\$wpdb->get_results('SHOW TABLES');
            foreach(\$all as \$t){ \$vals=array_values((array)\$t); echo \$vals[0].PHP_EOL; }
            " --allow-root 2>&1
            echo "=== WP registered shortcodes with opp ==="
            wp eval "global \$shortcode_tags; foreach(array_keys(\$shortcode_tags) as \$k){ if(strpos(\$k,'opp')!==false) echo \$k.PHP_EOL; }" --allow-root 2>&1
