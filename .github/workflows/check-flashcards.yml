name: Check Flashcard Pages

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Read ugk_snippets and opp shortcodes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            echo "=== All snippets in ugk_snippets ==="
            wp eval "
            global \$wpdb;
            \$rows=\$wpdb->get_results('SELECT id,name,active,LEFT(code,800) as code FROM ugk_snippets ORDER BY id');
            foreach(\$rows as \$r){
              echo 'SNIPPET ID:'.\$r->id.' active:'.\$r->active.' name:'.\$r->name.PHP_EOL;
              echo \$r->code.PHP_EOL;
              echo '===END==='.PHP_EOL;
            }
            " --allow-root 2>&1
