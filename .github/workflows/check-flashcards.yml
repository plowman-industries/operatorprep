name: Check Flashcard Pages

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Find flashcard shortcode registration
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            echo "=== Searching broadly for opp_ shortcodes ==="
            grep -r "opp_.*flashcard\|flashcard.*shortcode\|add_shortcode.*flash" wp-content/ --include="*.php" -l 2>/dev/null | head -10
            echo "=== Check mu-plugins ==="
            ls wp-content/mu-plugins/ 2>/dev/null
            echo "=== Check for operatorprep plugin ==="
            ls wp-content/plugins/ 2>/dev/null | grep -i "operator\|opp\|prep"
            echo "=== Dynamic shortcode check ==="
            grep -r "add_shortcode" wp-content/themes/operatorprep-child/ --include="*.php" 2>/dev/null
            echo "=== Check functions.php for shortcode ==="
            grep -n "shortcode\|flashcard" wp-content/themes/operatorprep-child/functions.php 2>/dev/null
