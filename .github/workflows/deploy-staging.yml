name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy theme to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: gcam1130.siteground.biz
          username: ${{ secrets.STAGING_SSH_USER }}
          password: ${{ secrets.STAGING_SSH_PASS }}
          port: 18765
          script: |
            STAGING_THEME="/home/${{ secrets.STAGING_SSH_USER }}/www/staging2.operatorprep.com/public_html/wp-content/themes/operatorprep-child"
            echo "Deploying to staging: $STAGING_THEME"
            mkdir -p "$STAGING_THEME"
            cd /tmp && rm -rf op-deploy && mkdir op-deploy
