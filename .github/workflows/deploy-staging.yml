name: Deploy to Staging

on:
  push:
    branches:
      - Staging2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy child theme to staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: gcam1130.siteground.biz
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            THEME_DIR="/home/${{ secrets.STAGING_SSH_USER }}/www/staging2.operatorprep.com/public_html/wp-content/themes/operatorprep-child"
            mkdir -p "$THEME_DIR"
            echo "Theme directory ready: $THEME_DIR"

      - name: Copy theme files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: gcam1130.siteground.biz
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          source: "wp-content/themes/operatorprep-child/*"
          target: "/home/${{ secrets.STAGING_SSH_USER }}/www/staging2.operatorprep.com/public_html/wp-content/themes/operatorprep-child/"
          strip_components: 2

      - name: Flush all caches
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: gcam1130.siteground.biz
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.STAGING_SSH_USER }}/www/staging2.operatorprep.com/public_html
            wp cache flush --allow-root 2>/dev/null || true
            wp sg purge --allow-root 2>/dev/null || true
            wp transient delete --all --allow-root 2>/dev/null || true
            echo "All caches flushed — $(date)"
