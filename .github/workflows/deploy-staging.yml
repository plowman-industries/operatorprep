name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy theme + installer to staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          source: "wp-content/themes/operatorprep-child/"
          target: "/home/${{ secrets.STAGING_SSH_USER }}/www/staging2.operatorprep.com/public_html/wp-content/themes/"
          strip_components: 2

      - name: Run installer and flush cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.STAGING_SSH_USER }}/www/staging2.operatorprep.com/public_html
            wp eval-file wp-content/themes/operatorprep-child/install.php --allow-root 2>&1 || true
            wp cache flush --allow-root 2>/dev/null || true
            echo "Done — $(date)"
