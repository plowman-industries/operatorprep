name: Verify T2 Flashcard Patch

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check snippet 11 for patch markers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval "
            global \$wpdb;
            \$row = \$wpdb->get_row('SELECT id, LENGTH(code) as len FROM ugk_snippets WHERE id=11');
            echo 'Code length: ' . \$row->len . PHP_EOL;
            \$code = \$wpdb->get_var('SELECT code FROM ugk_snippets WHERE id=11');
            echo 'Has random btn: ' . (strpos(\$code,'opp-t2-btn-random')!==false?'YES':'NO') . PHP_EOL;
            echo 'Has print btn:  ' . (strpos(\$code,'opp-t2-btn-print')!==false?'YES':'NO') . PHP_EOL;
            echo 'Has buildT2PrintCards: ' . (strpos(\$code,'buildT2PrintCards')!==false?'YES':'NO') . PHP_EOL;
            echo 'Has openDeck listener: ' . (strpos(\$code,'openDeck')!==false?'YES':'NO') . PHP_EOL;
            " --allow-root 2>&1
