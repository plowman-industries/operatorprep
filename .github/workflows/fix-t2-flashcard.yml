name: Fix T2 Flashcard Buttons

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Patch snippet 11 to add Random Study Mode + Print buttons
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html

            cat > /tmp/fix_t2_fc.php << 'PHPEOF'
<?php
global $wpdb;
$row = $wpdb->get_row("SELECT id, code FROM ugk_snippets WHERE id=11");
if (!$row) { echo 'ERROR: snippet 11 not found'; exit(1); }
$code = $row->code;

// Idempotency check
if (strpos($code, 'opp-t2-btn-random') !== false) {
    echo 'ALREADY PATCHED - no changes made';
    exit(0);
}

// ── PATCH 1: Insert action buttons + CSS before the category grid ──────────
$search1 = '<div class="opp-fc-category-grid" id="opp-fc-cat-grid">';
if (strpos($code, $search1) === false) {
    echo 'ERROR: patch 1 search string not found'; exit(1);
}
$insert1 = '<style>
    .opp-fc-actions{display:flex;gap:12px;justify-content:center;margin-bottom:25px;flex-wrap:wrap}
    .opp-fc-action-btn{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#2a5a8a,#1a3a5a);border:2px solid #3a7aba;border-radius:12px;padding:16px 28px;cursor:pointer;transition:all .2s;color:#fff;font-size:1.05em;font-weight:600}
    .opp-fc-action-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(42,90,138,.5);border-color:#5a9ada}
    .opp-fc-action-btn .icon{font-size:1.4em}
    .opp-fc-action-btn.print-btn{background:linear-gradient(135deg,#2E7D32,#1a4a1e);border-color:#3a8a3e}
    .opp-fc-action-btn.print-btn:hover{box-shadow:0 4px 20px rgba(46,125,50,.5);border-color:#5aaa5e}
    @media print{body>*{display:none !important}.opp-t2-print-area{display:block !important;width:100%}@page{size:letter portrait;margin:0}.avery-page{width:8.5in;height:11in;padding:0.5in 0 0 1.75in;box-sizing:border-box;page-break-after:always;display:flex;flex-direction:column;gap:0}.avery-page:last-child{page-break-after:auto}.avery-card{width:5in;height:3in;border:1px dashed #ccc;box-sizing:border-box;padding:0.3in;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;margin-bottom:0.167in;page-break-inside:avoid}.avery-front-term{font-family:Arial,sans-serif;font-size:18pt;font-weight:700;color:#000;text-align:center;line-height:1.3}.avery-back-term{font-family:Arial,sans-serif;font-size:12pt;font-weight:700;color:#000;text-align:center;margin-bottom:6pt;border-bottom:1pt solid #ccc;padding-bottom:4pt;width:100%}.avery-back-def{font-family:Arial,sans-serif;font-size:11pt;color:#333;line-height:1.4;text-align:center}.avery-back-cat{font-family:Arial,sans-serif;font-size:8pt;color:#999;margin-top:auto;text-align:center}}
    .opp-t2-print-area{display:none}
    </style>
    <div class="opp-fc-actions" id="opp-t2-fc-actions">
        <div class="opp-fc-action-btn" id="opp-t2-btn-random"><span class="icon">&#127922;</span><span>Random Study Mode<br><small style="font-weight:400;font-size:.8em;opacity:.7">All cards shuffled</small></span></div>
        <div class="opp-fc-action-btn print-btn" id="opp-t2-btn-print"><span class="icon">&#128424;</span><span>Print Flash Cards<br><small style="font-weight:400;font-size:.8em;opacity:.7">Avery 5388 double-sided</small></span></div>
    </div>
    <p class="opp-fc-sub" style="margin-bottom:12px;font-size:.9em">Or study by category:</p>
    ';
$code = str_replace($search1, $insert1 . $search1, $code, $c1);
echo "Patch 1 (HTML+CSS): replaced $c1 time(s)\n";

// ── PATCH 2: Wire up buttons inside the IIFE (before loadCategories()) ─────
$search2 = 'loadCategories();';
if (strpos($code, $search2) === false) {
    echo 'ERROR: patch 2 search string not found'; exit(1);
}
// Count occurrences - should be exactly 1
$occ = substr_count($code, $search2);
echo "Occurrences of '$search2': $occ\n";

$js_addition = '// T2 action buttons - Random Study Mode + Print Flash Cards
        var _t2PrintArea = document.createElement(\'div\');
        _t2PrintArea.id = \'opp-t2-print-area\';
        _t2PrintArea.className = \'opp-t2-print-area\';
        document.getElementById(\'opp-t2-flashcards\').appendChild(_t2PrintArea);

        function buildT2PrintCards() {
            var slugs = [\'source-water\',\'coagulation\',\'sedimentation\',\'filtration\',\'disinfection\',\'corrosion-water-quality\',\'regulations\',\'special-treatment\'];
            var area = _t2PrintArea;
            area.innerHTML = \'<div style="text-align:center;padding:20px;color:#fff">Loading cards for printing…</div>\';
            document.body.appendChild(area);
            area.style.display = \'block\';
            Promise.all(slugs.map(function(s) {
                return fetch(API + \'/quiz/\' + s + \'?all=1\', { headers: { \'X-WP-Nonce\': restNonce } }).then(function(r) { return r.json(); });
            })).then(function(results) {
                var all = [];
                results.forEach(function(data) {
                    if (data && data.questions) {
                        data.questions.forEach(function(q) {
                            var correct = (q.answers || []).filter(function(a) { return a.correct; }).map(function(a) { return a.text; }).join(\' • \');
                            all.push({ q: q.question, a: correct, cat: data.category });
                        });
                    }
                });
                var h = \'\';
                for (var p = 0; p < all.length; p += 3) {
                    var batch = all.slice(p, Math.min(p + 3, all.length));
                    h += \'<div class="avery-page">\';
                    for (var i = 0; i < batch.length; i++) h += \'<div class="avery-card"><div class="avery-front-term">\' + batch[i].q + \'</div></div>\';
                    for (var i = batch.length; i < 3; i++) h += \'<div class="avery-card"></div>\';
                    h += \'</div><div class="avery-page">\';
                    for (var i = batch.length - 1; i >= 0; i--) h += \'<div class="avery-card"><div class="avery-back-term">\' + batch[i].cat + \'</div><div class="avery-back-def">\' + batch[i].a + \'</div></div>\';
                    for (var i = batch.length; i < 3; i++) h += \'<div class="avery-card"></div>\';
                    h += \'</div>\';
                }
                area.innerHTML = h;
                setTimeout(function() {
                    window.print();
                    setTimeout(function() { area.style.display = \'none\'; document.getElementById(\'opp-t2-flashcards\').appendChild(area); }, 500);
                }, 300);
            }).catch(function() {
                area.innerHTML = \'<div style="text-align:center;padding:20px;color:#fff">Error loading cards.</div>\';
            });
        }

        document.getElementById(\'opp-t2-btn-random\').addEventListener(\'click\', function() { openDeck(\'random-all\', \'Random Study Mode\'); });
        document.getElementById(\'opp-t2-btn-print\').addEventListener(\'click\', buildT2PrintCards);

        ';
$code = str_replace($search2, $js_addition . $search2, $code, $c2);
echo "Patch 2 (JS wiring): replaced $c2 time(s)\n";

if ($c1 === 0 || $c2 === 0) {
    echo 'ERROR: one or more patches failed - aborting without DB update';
    exit(1);
}

// Save to DB
$result = $wpdb->update('ugk_snippets', array('code' => $code), array('id' => 11));
if ($result === false) {
    echo 'DB ERROR: ' . $wpdb->last_error;
    exit(1);
}
echo "SUCCESS: snippet 11 updated";
wp_cache_flush();
PHPEOF

            wp eval-file /tmp/fix_t2_fc.php --allow-root 2>&1
            rm -f /tmp/fix_t2_fc.php
