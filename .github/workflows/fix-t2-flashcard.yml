name: Fix T2 Flashcard Buttons

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy PHP patch script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          source: scripts/fix_t2_fc.php
          target: /tmp/opp-patch/

      - name: Run patch script via WP-CLI
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval-file /tmp/opp-patch/scripts/fix_t2_fc.php --allow-root 2>&1
            rm -rf /tmp/opp-patch
