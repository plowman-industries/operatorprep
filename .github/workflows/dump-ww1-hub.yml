name: Dump WW1 Hub Full Content

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SCP script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          source: "scripts/dump_ww1_hub_full.php"
          target: /tmp/opp-dump/

      - name: Run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval-file /tmp/opp-dump/scripts/dump_ww1_hub_full.php --allow-root 2>&1

      - name: Cleanup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: rm -rf /tmp/opp-dump
