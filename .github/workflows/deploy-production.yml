name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirmed:
        description: "Type DEPLOY to confirm"
        required: true
      sprint:
        description: "What changed"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Confirm
        run: |
          if [ "${{ github.event.inputs.confirmed }}" != "DEPLOY" ]; then
            echo "Must type DEPLOY to confirm. Aborting."
            exit 1
          fi

      - name: Copy theme files to production via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          source: "wp-content/themes/operatorprep-child/"
          target: "/home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html/wp-content/themes/"
          strip_components: 2

      - name: Run installer and flush cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval-file wp-content/themes/operatorprep-child/install.php --allow-root 2>&1 || true
            wp cache flush --allow-root 2>/dev/null || true
            wp sg purge --allow-root 2>/dev/null || true
            wp transient delete --all --allow-root 2>/dev/null || true
            echo "PRODUCTION DEPLOY COMPLETE — $(date)"
            echo "Sprint: ${{ github.event.inputs.sprint }}"
