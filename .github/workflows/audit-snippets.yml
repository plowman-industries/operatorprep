name: Audit Snippets and Flashcard Data

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: List all snippets + check flashcard options
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.operatorprep.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 18765
          script: |
            cd /home/${{ secrets.PROD_SSH_USER }}/www/operatorprep.com/public_html
            wp eval "
            global \$wpdb;

            echo '=== ALL SNIPPETS ===' . PHP_EOL;
            \$rows = \$wpdb->get_results('SELECT id, name, active FROM ugk_snippets ORDER BY id ASC');
            foreach(\$rows as \$r) {
              echo \$r->id . ' | ' . (\$r->active ? 'ON ' : 'OFF') . ' | ' . \$r->name . PHP_EOL;
            }

            echo PHP_EOL . '=== FLASHCARD WP_OPTIONS DATA ===' . PHP_EOL;
            \$levels = ['t1','t2','t3','t4','t5','d1','d2','d3','d4','d5','ww1','ww2','ww3','ww4','ww5'];
            foreach(\$levels as \$l) {
              \$val = get_option('opp_flashcard_' . \$l, null);
              if (\$val === null) { echo \$l . ': NOT SET' . PHP_EOL; continue; }
              \$data = json_decode(\$val, true);
              if (empty(\$data)) { echo \$l . ': EMPTY ({})' . PHP_EOL; continue; }
              \$cats = array_keys(\$data);
              \$total = array_sum(array_map(function(\$c) use (\$data) { return count(\$data[\$c]['terms'] ?? []); }, \$cats));
              echo \$l . ': ' . count(\$cats) . ' categories, ' . \$total . ' terms — [' . implode(', ', \$cats) . ']' . PHP_EOL;
            }

            echo PHP_EOL . '=== REST ROUTES (opp*) ===' . PHP_EOL;
            \$server = rest_get_server();
            foreach (\$server->get_routes() as \$route => \$handlers) {
              if (strpos(\$route, 'opp') !== false) echo \$route . PHP_EOL;
            }
            " --allow-root 2>&1
